<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Docket Management System</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="wrap wrap-narrow">
    <header class="header">
      <p class="eyebrow">Regional Trial Court &middot; Docket Management System</p>
      <h1>Dashboard</h1>
      <p class="sub">Milestone 2 placeholder. Real dashboard content (today's hearings, counts, upcoming hearings) arrives in Milestone 5.</p>
    </header>

    <section class="card">
      <p class="dashboard-welcome">
        Signed in as <strong id="userEmail">&hellip;</strong>
      </p>
      <button type="button" class="btn-secondary" id="logoutBtn">Log out</button>
    </section>
  </main>

  <script type="module" src="js/dashboard.js"></script>

</body>
</html>
