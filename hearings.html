<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearings — Docket Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="app-nav">
    <span class="app-nav-brand">
      <i data-lucide="scale" aria-hidden="true"></i>
      Docket Management System
    </span>
    <div class="app-nav-links">
      <a class="app-nav-link" href="home.html"><i data-lucide="house" aria-hidden="true"></i>Home</a>
      <a class="app-nav-link active" href="hearings.html"><i data-lucide="gavel" aria-hidden="true"></i>Hearings</a>
      <a class="app-nav-link" href="calendar.html"><i data-lucide="calendar-days" aria-hidden="true"></i>Calendar</a>
    </div>
    <div class="app-nav-user">
      <span class="app-nav-email" id="userEmail">&hellip;</span>
      <button type="button" class="app-nav-logout" id="logoutBtn">
        <i data-lucide="log-out" aria-hidden="true"></i>
        <span>Log out</span>
      </button>
    </div>
  </nav>

  <main class="wrap wrap-wide">
    <header class="header">
      <p class="eyebrow">Regional Trial Court &middot; Docket Management System</p>
      <h1>Hearings</h1>
      <p class="sub">Schedule, edit, and manage hearings and their attached case numbers.</p>
    </header>

    <div class="toolbar">
      <button type="button" class="btn-primary btn-inline" id="addHearingBtn">
        <i data-lucide="plus" aria-hidden="true"></i>
        <span>Add Hearing</span>
      </button>

      <div class="toolbar-export-group">
        <input type="date" id="exportDateInput" aria-label="Date to export">
        <button type="button" class="btn-small" id="exportDateBtn">
          <i data-lucide="file-down" aria-hidden="true"></i>
          <span>Export Date</span>
        </button>
        <button type="button" class="btn-small" id="exportWeekBtn">
          <i data-lucide="file-down" aria-hidden="true"></i>
          <span>Export Week</span>
        </button>
        <button type="button" class="btn-small" id="exportMonthBtn">
          <i data-lucide="file-down" aria-hidden="true"></i>
          <span>Export Month</span>
        </button>
      </div>
    </div>
    <p class="form-error" id="toolbarExportStatus" role="alert"></p>

    <div id="formPanel"></div>

    <section class="card card-flush" id="listCard">
      <table class="data-table" id="hearingsTable">
        <thead>
          <tr>
            <th>Date</th>
            <th>Time</th>
            <th>Section</th>
            <th>Status</th>
            <th># Cases</th>
            <th>Case No(s).</th>
            <th>Accused</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="hearingsTableBody">
          <tr><td colspan="8" class="empty-row">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </section>

    <footer class="app-footer">Created by Jordan Panganiban</footer>
  </main>

  <script type="module" src="js/hearings.js"></script>
  <script src="https://unpkg.com/docx@8.0.4/build/index.js" defer></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>if (window.lucide) { lucide.createIcons(); }</script>

</body>
</html>
