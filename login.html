<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In — Docket Management System</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <main class="wrap wrap-narrow">
    <header class="header">
      <p class="eyebrow">Regional Trial Court &middot; Docket Management System</p>
      <h1>Branch Clerk Log In</h1>
      <p class="sub">Sign in with your court-issued account to access the docket.</p>
    </header>

    <section class="card">
      <form id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>

        <p class="form-error" id="loginError" role="alert"></p>

        <button type="submit" class="btn-primary" id="submitBtn">Log in</button>
      </form>
    </section>

    <p class="footnote">This is an internal system. Access is limited to authorized court personnel.</p>
  </main>

  <script type="module" src="js/login.js"></script>

</body>
</html>
