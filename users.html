<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users — Docket Management System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <nav class="app-nav">
    <span class="app-nav-brand">
      <i data-lucide="scale" aria-hidden="true"></i>
      Docket Management System
    </span>
    <div class="app-nav-links">
      <a class="app-nav-link" href="home.html"><i data-lucide="house" aria-hidden="true"></i>Home</a>
      <a class="app-nav-link" href="hearings.html"><i data-lucide="gavel" aria-hidden="true"></i>Hearings</a>
      <a class="app-nav-link" href="calendar.html"><i data-lucide="calendar-days" aria-hidden="true"></i>Calendar</a>
      <a class="app-nav-link" href="activity.html" data-permission="activityLog.view"><i data-lucide="history" aria-hidden="true"></i>Activity Log</a>
      <a class="app-nav-link" href="reports.html" data-permission="reports.view"><i data-lucide="bar-chart-3" aria-hidden="true"></i>Reports</a>
      <a class="app-nav-link active" href="users.html" data-permission="users.manage"><i data-lucide="users" aria-hidden="true"></i>Users</a>
    </div>
    <div class="app-nav-user">
      <span class="app-nav-email" id="userEmail">&hellip;</span>
      <button type="button" class="app-nav-logout" id="logoutBtn">
        <i data-lucide="log-out" aria-hidden="true"></i>
        <span>Log out</span>
      </button>
    </div>
  </nav>

  <main class="wrap wrap-wide">
    <header class="header">
      <p class="eyebrow">Regional Trial Court &middot; Docket Management System</p>
      <h1>Users</h1>
      <p class="sub">Accounts that have signed in, and the role each one has.</p>
    </header>

    <div class="toolbar">
      <button type="button" class="btn-primary btn-inline" disabled title="Not available yet — accounts are created by signing in for the first time">
        <i data-lucide="user-plus" aria-hidden="true"></i>
        <span>Add User (coming soon)</span>
      </button>
    </div>
    <p class="form-error" id="usersStatus" role="alert"></p>

    <section class="card card-flush" id="listCard">
      <table class="data-table" id="usersTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Role</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="3" class="empty-row">Loading&hellip;</td></tr>
        </tbody>
      </table>
    </section>

    <footer class="app-footer">Created by Jordan Panganiban</footer>
  </main>

  <script type="module" src="js/users.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>if (window.lucide) { lucide.createIcons(); }</script>

</body>
</html>
